    - data:
        agent_parameters:
          instruction:
            type: constant
            value: 'Use the tools in Actionbook to perform browser operations.


              First, use the search and get APIs to retrieve the page structure information.


              You are not allowed to return immediately after calling search and get
              — you must continue operating the browser to obtain the latest information.


              Then, start operating the browser using Hyperbrowser to execute actions
              and retrieve the most up-to-date information from the page.


              Note: When querying Hugging Face models, you must first navigate to
              the specific model’s detail page, and then summarize the model’s description
              and parameters.


              Do not stop at the search results page — you must click into the target
              model page before summarizing.


              Before return llm_response you must make sure use browser stop session'
          maximum_iterations:
            type: constant
            value: 20
          model:
            type: constant
            value:
              completion_params: {}
              mode: chat
              model: gpt-5.4-mini
              model_type: llm
              provider: langgenius/openai/openai
              type: model-selector
