identity:
  name: browser_operator
  author: actionbook
  label:
    en_US: Browser Operator
    zh_Hans: Browser Operator
description:
  human:
    en_US: Perform browser page operations (navigate, click, type, screenshot, etc.).
    zh_Hans: 执行浏览器页面操作（导航、点击、输入、截图等）。
  llm: >
    Unified browser operator for all page interactions. Choose an action and
    provide the required parameters for that action:

    - navigate: requires url. Navigates to URL; returns page title and current URL.
    - click: requires selector. Waits for element to appear then clicks it.
    - type: requires selector, text. Types text character-by-character (appends to existing).
    - fill: requires selector. Optional text (empty string clears field). Clears input then fills atomically (preferred for forms).
    - select: requires selector, value. Selects an <option> by its value attribute in a <select>.
    - press_key: requires key. Sends a keyboard key (e.g. Enter, Tab, Escape, ArrowDown).
    - hover: requires selector. Moves mouse over element to trigger hover effects.
    - screenshot: optional full_page. Captures PNG screenshot; returns image blob and current URL.
    - get_text: optional selector. Returns visible text of a specific element or entire body.
    - get_html: optional selector. Returns HTML of a specific element or the full page.
    - wait: requires selector. Waits for element to appear in DOM within timeout.
    - wait_navigation: optional timeout_ms. Waits for current page navigation to complete.
    - go_back: no extra params. Navigates to the previous page in history.
    - go_forward: no extra params. Navigates to the next page in history.
    - reload: no extra params. Reloads the current page.

    Always use cdp_url from browser_create_session ws_endpoint field.
parameters:
  - name: cdp_url
    type: string
    required: true
    label:
      en_US: CDP WebSocket URL
      zh_Hans: CDP WebSocket URL
    human_description:
      en_US: WebSocket endpoint from browser_create_session (ws_endpoint field).
      zh_Hans: 来自 browser_create_session 的 WebSocket 端点（ws_endpoint 字段）。
    llm_description: >
      WebSocket CDP endpoint. Use the ws_endpoint value returned by browser_create_session.
    form: llm
  - name: action
    type: select
    required: true
    options:
      - value: navigate
        label:
          en_US: navigate
          zh_Hans: navigate
      - value: click
        label:
          en_US: click
          zh_Hans: click
      - value: type
        label:
          en_US: type
          zh_Hans: type
      - value: fill
        label:
          en_US: fill
          zh_Hans: fill
      - value: select
        label:
          en_US: select
          zh_Hans: select
      - value: press_key
        label:
          en_US: press_key
          zh_Hans: press_key
      - value: hover
        label:
          en_US: hover
          zh_Hans: hover
      - value: screenshot
        label:
          en_US: screenshot
          zh_Hans: screenshot
      - value: get_text
        label:
          en_US: get_text
          zh_Hans: get_text
      - value: get_html
        label:
          en_US: get_html
          zh_Hans: get_html
      - value: wait
        label:
          en_US: wait
          zh_Hans: wait
      - value: wait_navigation
        label:
          en_US: wait_navigation
          zh_Hans: wait_navigation
      - value: go_back
        label:
          en_US: go_back
          zh_Hans: go_back
      - value: go_forward
        label:
          en_US: go_forward
          zh_Hans: go_forward
      - value: reload
        label:
          en_US: reload
          zh_Hans: reload
    label:
      en_US: Action
      zh_Hans: 操作
    human_description:
      en_US: The browser operation to perform.
      zh_Hans: 要执行的浏览器操作。
    llm_description: >
      Browser action to perform. See tool description for required parameters per action.
    form: llm
  - name: url
    type: string
    required: false
    label:
      en_US: URL
      zh_Hans: 目标 URL
    human_description:
      en_US: Target URL for navigate action (must start with http:// or https://).
      zh_Hans: navigate 操作的目标 URL（必须以 http:// 或 https:// 开头）。
    llm_description: >
      Required for action=navigate. Full URL to navigate to (must start with http:// or https://).
    form: llm
  - name: selector
    type: string
    required: false
    label:
      en_US: CSS Selector
      zh_Hans: CSS 选择器
    human_description:
      en_US: CSS selector for the target element. Required for click, type, fill, select, hover, wait. Optional for get_text, get_html.
      zh_Hans: 目标元素的 CSS 选择器。click/type/fill/select/hover/wait 必填；get_text/get_html 可选。
    llm_description: >
      CSS selector for the target element.
      Required for: click, type, fill, select, hover, wait.
      Optional for: get_text (defaults to body text), get_html (defaults to full page HTML).
      Use selectors from search_actions or get_action_by_area_id results.
    form: llm
  - name: text
    type: string
    required: false
    label:
      en_US: Text
      zh_Hans: 文本内容
    human_description:
      en_US: Text to type or fill. Required for type and fill actions.
      zh_Hans: 要输入或填充的文本。type 和 fill 操作必填。
    llm_description: >
      Text content to input.
      Required for action=type (appends text key-by-key to existing content).
      For action=fill: sets the field value atomically. Pass empty string "" to clear the field.
    form: llm
  - name: value
    type: string
    required: false
    label:
      en_US: Select Option Value
      zh_Hans: 选项 value
    human_description:
      en_US: The value attribute of the <option> to select. Required for select action.
      zh_Hans: 要选择的 <option> 的 value 属性。select 操作必填。
    llm_description: >
      Required for action=select. The value attribute of the <option> to choose.
      Example: "US" for <option value="US">United States</option>
    form: llm
  - name: key
    type: string
    required: false
    label:
      en_US: Key
      zh_Hans: 按键
    human_description:
      en_US: Keyboard key to press. Required for press_key action.
      zh_Hans: 要按下的键盘键。press_key 操作必填。
    llm_description: >
      Required for action=press_key. Keyboard key name to press.
      Examples: Enter, Tab, Escape, Space, Backspace, Delete,
      ArrowUp, ArrowDown, ArrowLeft, ArrowRight, Home, End, PageUp, PageDown.
    form: llm
  - name: full_page
    type: select
    required: false
    default: "false"
    options:
      - value: "false"
        label:
          en_US: Viewport only
          zh_Hans: 仅视口
      - value: "true"
        label:
          en_US: Full page
          zh_Hans: 完整页面
    label:
      en_US: Screenshot Mode
      zh_Hans: 截图模式
    human_description:
      en_US: For screenshot action — capture only the visible viewport or the entire scrollable page.
      zh_Hans: screenshot 操作 — 仅截取可见视口还是整个页面。
    llm_description: >
      For action=screenshot. Set to "true" to capture the full scrollable page. Default "false" captures viewport only.
    form: llm
  - name: timeout_ms
    type: number
    required: false
    default: 30000
    label:
      en_US: Timeout (ms)
      zh_Hans: 超时（毫秒）
    human_description:
      en_US: Operation timeout in milliseconds (default 30000).
      zh_Hans: 操作超时，单位毫秒（默认 30000）。
    llm_description: >
      Timeout in milliseconds. Only used by these actions:
      navigate (page load timeout), click (wait-for-element timeout),
      wait (wait-for-selector timeout), wait_navigation (load timeout).
      Ignored by other actions. Default is 30000 (30 seconds).
    form: llm
extra:
  python:
    source: tools/browser_operator.py
