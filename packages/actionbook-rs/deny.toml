# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Known advisories in transitive dependencies — tracked for future update
ignore = [
    { id = "RUSTSEC-2025-0119", reason = "rustls-webpki in transitive dep (chromiumoxide -> rustls)" },
    { id = "RUSTSEC-2026-0049", reason = "transitive dependency — awaiting upstream fix" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "0BSD",
    "Unlicense",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
